name: Build & Push (STAGING) to ghcr.io

# Staging build of the YT app. Mirrors .github/workflows/build-push.yml EXACTLY
# (same context, same Dockerfile, same build-arg set, same cache) — the ONLY
# difference is the NEXT_PUBLIC_* build-args carry STAGING values instead of prod.
#
# WHY a separate build (not a same-image promote):
#   NEXT_PUBLIC_* vars are baked into the JS bundle at BUILD time. The staging
#   binary must be built with the Clerk DEV pk_test, the staging Supabase URL,
#   and the staging anon JWT. Promote-to-prod = rebuild the SAME commit with the
#   prod build-args (see build-push.yml) — different binary, same source.
#
# INPUTS are PUBLIC (pk_test + anon JWT are client-side, non-secret), so they are
# workflow_dispatch inputs with sensible defaults, NOT repo secrets. Output image
# is tagged :staging-<sha> so it can never be mistaken for a prod image.

on:
  workflow_dispatch:
    inputs:
      clerk_publishable_key:
        description: 'Clerk DEV publishable key (pk_test_...) — PUBLIC'
        required: true
        type: string
      supabase_anon_key:
        description: 'Staging anon JWT (NEXT_PUBLIC_SUPABASE_ANON_KEY, from staging_bootstrap.sh) — PUBLIC'
        required: true
        type: string
      supabase_url:
        description: 'Staging PostgREST URL'
        required: false
        default: 'https://staging.bentech.dev/rest/v1'
        type: string
      app_url:
        description: 'Staging app URL'
        required: false
        default: 'https://staging.bentech.dev'
        type: string

jobs:
  build-and-push-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (staging build-args)
        uses: docker/build-push-action@v5
        with:
          # SAME context + Dockerfile as the prod build so the binary can't drift.
          context: .
          file: ./Dockerfile
          push: true
          # Staging-only tags. :staging-<sha> is the promotable identifier; the
          # moving :staging tag is a convenience pointer to the latest staging build.
          tags: |
            ghcr.io/lewis159/youtube-transcriber:staging
            ghcr.io/lewis159/youtube-transcriber:staging-${{ github.sha }}
          # SAME build-arg KEYS the prod workflow passes — STAGING values.
          # (NEXT_PUBLIC_GA_ID intentionally omitted: analytics off on staging.
          #  The Dockerfile defaults the NEXT_PUBLIC_CLERK_* redirect ARGs, so we
          #  pass exactly the same explicit args prod does and let the rest default.)
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ inputs.clerk_publishable_key }}
            NEXT_PUBLIC_SUPABASE_URL=${{ inputs.supabase_url }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ inputs.supabase_anon_key }}
            NEXT_PUBLIC_APP_URL=${{ inputs.app_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
