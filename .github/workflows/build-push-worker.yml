name: Build & Push Whisper Worker to ghcr.io

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'whisper-worker/**'
      - '.github/workflows/build-push-worker.yml'

jobs:
  build-and-push-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./whisper-worker
          file: ./whisper-worker/Dockerfile
          push: true
          tags: |
            ghcr.io/lewis159/youtube-transcriber-worker:latest
            ghcr.io/lewis159/youtube-transcriber-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
