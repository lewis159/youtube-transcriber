version: '3.9'

services:
  # nginx reverse proxy 1 — public entry point on port 4000
  nginx-ha-1:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "4000:4000"
    depends_on:
      - app-4001
      - app-4002
    restart: unless-stopped
    networks:
      - youtube-transcriber-network

  # nginx reverse proxy 2 — public entry point on port 4001
  nginx-ha-2:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "4001:4000"
    depends_on:
      - app-4001
      - app-4002
    restart: unless-stopped
    networks:
      - youtube-transcriber-network

  # App instance 1 on internal port 3000, exposed as 4002
  app-4001:
    build:
      context: .
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        - NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
        - NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
    ports:
      - "4002:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL}
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL}
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL}
      - NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL}
      - NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      # Admin Containers page talks to Docker via the socket-proxy (never the raw socket).
      # lib/docker.ts reads DOCKER_HOST; this matches how prod is wired.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # Local Ollama LLM for summaries/chat (OpenAI-compatible endpoint).
      - LLM_PROVIDER=local
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=qwen2.5:3b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_started
      docker-socket-proxy:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - youtube-transcriber-network

  # App instance 2 on internal port 3000, exposed as 4003
  app-4002:
    build:
      context: .
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        - NEXT_PUBLIC_CLERK_SIGN_IN_URL
        - NEXT_PUBLIC_CLERK_SIGN_UP_URL
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        - NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
        - NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL
        - NEXT_PUBLIC_SUPABASE_URL
        - NEXT_PUBLIC_SUPABASE_ANON_KEY
    ports:
      - "4003:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_URL}
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL}
      - NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL=${NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL}
      - NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=${NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL}
      - NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=${NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      # Admin Containers page talks to Docker via the socket-proxy (never the raw socket).
      # lib/docker.ts reads DOCKER_HOST; this matches how prod is wired.
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # Local Ollama LLM for summaries/chat (OpenAI-compatible endpoint).
      - LLM_PROVIDER=local
      - LLM_BASE_URL=http://ollama:11434/v1
      - LLM_MODEL=qwen2.5:3b
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_started
      docker-socket-proxy:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - youtube-transcriber-network

  # Least-privilege Docker API gateway for the admin Containers page.
  # The app never mounts the raw socket; only this proxy does, and it whitelists
  # just the container list + lifecycle endpoints the page uses.
  # Prod (yt.bentech.dev on Portainer) must run an equivalent proxy service.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      # GET /containers/json (list) — required to render the page.
      - CONTAINERS=1
      # POST /containers/<id>/{start,stop,pause,unpause,restart,kill} — the page's lifecycle actions.
      - POST=1
      # Everything else stays denied (default 0): no images, exec, volumes, networks, etc.
    volumes:
      # Read-only mount of the host Docker socket — only the proxy touches it.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - youtube-transcriber-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - youtube-transcriber-network

  # Local Ollama LLM server — OpenAI-compatible API at http://ollama:11434/v1.
  # Internal only (no published ports); the app services reach it over the network.
  # CPU only. Pulled models persist in the ollama_models volume.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    networks:
      - youtube-transcriber-network

volumes:
  redis_data:
  nginx_logs:
  ollama_models:

networks:
  youtube-transcriber-network:
    driver: bridge
