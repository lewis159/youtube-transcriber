version: '3.9'

services:
  test-runner:
    labels:
      - "project=YT_Transcription"
      - "project.component=test-runner"
      - "project.env=dev"
    build:
      context: ./test-runner
    environment:
      - APP_URL=http://nginx
    networks:
      - youtube-transcriber-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  youtube-transcriber-network:
    driver: bridge
    external: true
