version: '3.9'

# Production Swarm stack for yt.bentech.dev
# Deploy via Portainer → Stacks → Add Stack (Swarm mode)
# Image built by GitHub Actions and pushed to ghcr.io on every push to main

services:

  app:
    image: ghcr.io/lewis159/youtube-transcriber:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_PRICE_STUDIO=${STRIPE_PRICE_STUDIO}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE}
      - NEXT_PUBLIC_APP_URL=https://yt.bentech.dev
      # ── Redis HA via Sentinel ──
      # App discovers the CURRENT master through Sentinel (service
      # `redis-failover`, port 26379) rather than pinning a single redis host.
      # Master name `mymaster`, quorum 2. The single password is in REDIS_PASSWORD.
      # See docker-compose.redis.yml + REDIS_HA_NOTES.md.
      - REDIS_URL=sentinel://redis-failover:26379/0?sentinelName=mymaster
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Admin container monitor talks to Docker via the read-only socket proxy,
      # never the raw socket (security finding #9).
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      # ── Pluggable LLM provider (summaries + Q&A chat) ──
      # Local Hermes Ollama reached over the external Hermes Swarm network.
      # See app-ha/lib/llm.ts: LLM_PROVIDER / LLM_BASE_URL / LLM_MODEL.
      - LLM_PROVIDER=local
      - LLM_BASE_URL=http://hermes-agent_ollama:11434/v1
      - LLM_MODEL=qwen2.5
    deploy:
      replicas: 2
      labels:
        - "project=YT_Transcription"
        - "project.component=app"
        - "project.env=prod"
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/ping || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - yt-prod
      - proxy

  # Tecnativa docker-socket-proxy: the ONLY service that touches the real
  # Docker socket. It exposes a locked-down HTTP API on :2375 to the app on the
  # internal yt-prod network. Whitelist = container list + lifecycle only;
  # every other API section stays denied (default 0).
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2.0
    environment:
      # Read: list/inspect containers (GET /containers/json, /containers/{id}/json)
      - CONTAINERS=1
      # Write: allow POST so start/stop/pause/restart/kill work
      - POST=1
      # Everything else explicitly denied
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
      - SERVICES=0
      - TASKS=0
      - NODES=0
      - SECRETS=0
      - CONFIGS=0
      - SWARM=0
      - SYSTEM=0
      - INFO=0
      - EXEC=0
      - AUTH=0
      - BUILD=0
      - COMMIT=0
      - PLUGINS=0
      - DISTRIBUTION=0
      - SESSION=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      replicas: 1
      # Must run where the socket lives — pin to a manager node.
      placement:
        constraints:
          - node.role == manager
      labels:
        - "project=YT_Transcription"
        - "project.component=docker-socket-proxy"
        - "project.env=prod"
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 64M
    networks:
      - yt-prod

  # ── Redis HA topology (Sentinel-managed primary/standby) ────────────────────
  # Replaces the old single `redis` service. Three services on yt-prod:
  #   redis-primary  — the master (AOF + auth)
  #   redis-standby  — replica of primary (auto-resyncs, can be promoted)
  #   redis-failover — Redis Sentinel; monitors mymaster, runs failover (quorum 2)
  #
  # Placement uses SOFT preferences (spread by node.id), NOT hard constraints, so
  # the whole stack still schedules on a single node TODAY and naturally spreads
  # when host #2 joins the Swarm. For GUARANTEED anti-affinity on 2 hosts, switch
  # to node-label constraints — see REDIS_HA_NOTES.md ("node-label hardening").
  redis-primary:
    image: redis:7-alpine
    command: >-
      redis-server --appendonly yes --appendfsync everysec
      --maxmemory 512mb --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
      --loglevel warning
    volumes:
      - redis-primary-data:/data
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      labels:
        - "project=YT_Transcription"
        - "project.component=redis-primary"
        - "project.env=prod"
      restart_policy:
        condition: on-failure
      resources:
        limits:
          # Slightly above --maxmemory 512mb to leave headroom for AOF buffers
          # / replication backlog / copy-on-write during BGSAVE.
          memory: 640M
    networks:
      - yt-prod

  redis-standby:
    image: redis:7-alpine
    # Same persistence + auth flags as the primary PLUS --replicaof so it joins
    # as a replica. On a Sentinel-driven failover this node may be PROMOTED to
    # master, so it must carry masterauth/requirepass identically.
    command: >-
      redis-server --appendonly yes --appendfsync everysec
      --maxmemory 512mb --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD} --masterauth ${REDIS_PASSWORD}
      --replicaof redis-primary 6379
      --loglevel warning
    volumes:
      - redis-standby-data:/data
    deploy:
      replicas: 1
      placement:
        preferences:
          - spread: node.id
      labels:
        - "project=YT_Transcription"
        - "project.component=redis-standby"
        - "project.env=prod"
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 640M
    networks:
      - yt-prod

  # Redis Sentinel. mode: global => exactly one Sentinel per Swarm node, so the
  # Sentinel count grows with the cluster (1 today, 2 when host #2 joins). Quorum
  # is 2: a 2-node cluster gives 2 Sentinels, enough to agree on a failover.
  #
  # Sentinel REWRITES its own config file at runtime (it persists discovered
  # replicas / the current epoch). Multiple containers therefore MUST NOT share a
  # single bind-mounted file. We generate a fresh, per-instance writable config in
  # /tmp at container start instead of bind-mounting one.
  #
  # ⚠️  announce-ip on Swarm: each Sentinel advertises its OWN overlay IP
  # (hostname -i). `sentinel resolve-hostnames yes` lets it monitor the
  # `redis-primary` SERVICE NAME on the overlay. This announce-ip approach MUST
  # be validated with a REAL failover drill on multi-node Swarm before trusting
  # it in prod — see REDIS_HA_NOTES.md ("Failover drill").
  redis-failover:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - |
        cat > /tmp/sentinel.conf <<EOF
        port 26379
        sentinel monitor mymaster redis-primary 6379 2
        sentinel auth-pass mymaster ${REDIS_PASSWORD}
        sentinel down-after-milliseconds mymaster 5000
        sentinel failover-timeout mymaster 10000
        sentinel parallel-syncs mymaster 1
        requirepass ${REDIS_PASSWORD}
        sentinel resolve-hostnames yes
        sentinel announce-ip "$(hostname -i | awk '{print $1}')"
        EOF
        exec redis-server /tmp/sentinel.conf --sentinel
    deploy:
      mode: global
      labels:
        - "project=YT_Transcription"
        - "project.component=redis-failover"
        - "project.env=prod"
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 64M
    networks:
      - yt-prod

  # Whisper transcription worker — pulls audio jobs off the prod redis queue,
  # transcribes on CPU (faster-whisper), writes transcripts to Supabase.
  # Image built+pushed by .github/workflows/build-push-worker.yml.
  #
  # ── HA / HORIZONTAL SCALING MODEL ───────────────────────────────────────────
  # This service is SAFE to run as N replicas. Each replica is an independent
  # BullMQ consumer (concurrency 1) on the SAME `transcription` queue. BullMQ
  # uses Redis-side per-job locking, so every replica atomically pulls a DISTINCT
  # job — no two workers process the same video. Effective throughput therefore
  # scales linearly: replicas: N  ==  N concurrent transcriptions.
  #
  # To scale: bump `deploy.replicas` below (or `docker service scale
  # <stack>_whisper-worker=N`). Default is 1 (the box is shared with Ollama);
  # raise once on dedicated capacity. Each +1 replica = +1 concurrent job AND
  # +1 set of CPU/mem limits consumed (limits are PER-REPLICA, see resources).
  #
  # No shared mutable state between replicas:
  #   • Job distribution: handled by Redis (BullMQ lock) — no coordination needed.
  #   • Temp/scratch audio: each container writes to its OWN /cache/tmp inside its
  #     OWN container filesystem / volume — no cross-replica collision.
  #   • Model weights cache (HF_HOME=/cache/huggingface): the `whisper-cache`
  #     named volume is PER-NODE on Swarm (a local volume is created on whichever
  #     node the task lands on). So the FIRST job a node runs downloads the model
  #     once; subsequent jobs on that node reuse it. Spreading replicas across M
  #     nodes => the model is pulled once per node, not once per replica.
  #   • DB writes are idempotent-by-design (status transitions + inserts keyed by
  #     video_id); a job is only ever held by one worker at a time anyway.
  # The one honest caveat is Redis Sentinel live failover — see the REDIS_URL
  # note and restart_policy below (the Python BullMQ client can't follow a master
  # that moves at runtime; it reconnects on restart).
  whisper-worker:
    image: ghcr.io/lewis159/youtube-transcriber-worker:latest
    environment:
      # ── Redis HA via Sentinel ──
      # Worker discovers the current master through Sentinel (`redis-failover`)
      # rather than a fixed redis host. Master name `mymaster`, quorum 2.
      # NOTE: the Python BullMQ client does not follow a master that moves at
      # runtime — on a Sentinel failover the worker exits and Swarm restarts it,
      # at which point it re-discovers the new master (see restart_policy below).
      - REDIS_URL=sentinel://redis-failover:26379/0?sentinelName=mymaster
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # ── Supabase (service-role key bypasses RLS) ──
      # SUPABASE_URL reuses the same project URL the app gets via
      # NEXT_PUBLIC_SUPABASE_URL; the worker also accepts SUPABASE_SERVICE_ROLE_KEY.
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # ── Whisper / transcription tuning ──
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_CPU_THREADS=${WHISPER_CPU_THREADS:-2}
      - MAX_AUDIO_SECONDS=${MAX_AUDIO_SECONDS:-7200}
      # ── Cache dirs (point at the mounted volume) ──
      - HF_HOME=/cache/huggingface
      - WHISPER_TEMP_DIR=/cache/tmp
    volumes:
      # Named volume holds model weights (huggingface cache) + scratch audio.
      - whisper-cache:/cache
    deploy:
      # Sensible default of 1. SCALE OUT by raising this number (or
      # `docker service scale <stack>_whisper-worker=N`) — each replica adds one
      # more concurrent transcription; BullMQ distributes jobs via Redis locking.
      # See the HA/SCALING MODEL block above the service for the full rationale.
      replicas: 1
      labels:
        - "project=YT_Transcription"
        - "project.component=whisper-worker"
        - "project.env=prod"
      # Spread replicas across nodes when scaled, so the per-node model cache is
      # warmed on each node and CPU load isn't piled onto one box. Soft (prefer)
      # so a single-node cluster still schedules all replicas.
      placement:
        preferences:
          - spread: node.id
      # on-failure is REQUIRED for HA, not just crash recovery: the Python BullMQ
      # client is NOT transparently Sentinel-failover-capable. When Sentinel
      # promotes a new Redis master at runtime the worker's connection breaks and
      # the process exits; Swarm restarts it and it re-discovers the new master at
      # boot (worker.py::_redis_connection()). This is the reconnect-on-restart
      # mitigation — do not change to "none".
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          # PER-REPLICA limits (Swarm applies resources to each task). These are
          # already correctly per-replica: each worker runs concurrency=1, so one
          # transcription's CPU/RAM fits one replica's budget. When scaling to N
          # replicas, ensure the cluster has N × these limits of free capacity.
          # Box is shared with Ollama — cap CPU/RAM. Raise on dedicated HW
          # (and bump WHISPER_CPU_THREADS to match the new core count).
          cpus: '${WHISPER_CPU_LIMIT:-2.0}'
          memory: ${WHISPER_MEM_LIMIT:-4G}
    networks:
      # yt-prod to reach redis. The worker itself does not call Ollama.
      - yt-prod

volumes:
  redis-primary-data:
  redis-standby-data:
  whisper-cache:

networks:
  yt-prod:
    driver: overlay

  proxy:
    external: true
