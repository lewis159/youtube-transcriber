# =============================================================================
# pgBackRest configuration — YT Transcriber self-hosted Postgres (Patroni HA)
# Target repo: OVH Object Storage (S3-compatible). PLACEHOLDER creds — fill via
# the ${PGBACKREST_S3_*} stack env (see db/pgbackrest/README.md). MUST be
# configured + a restore tested BEFORE cutover.
# =============================================================================
# Mount this file into the Spilo containers at /etc/pgbackrest/pgbackrest.conf
# (and set the matching Spilo env so Patroni uses pgBackRest for archive_command
# + restore_command — see README "Wiring into Spilo/Patroni").
#
# pgBackRest reads S3 secrets from the environment when the value is left to the
# `${...}` placeholder via an env-templated render, OR you can hardcode them in
# the [global] section below at deploy time. Recommended: render this file from
# env on container start so no secrets are committed.
# =============================================================================

[global]
# ---- Repository: OVH Object Storage (S3-compatible) -------------------------
repo1-type=s3
repo1-s3-bucket=${PGBACKREST_S3_BUCKET}
repo1-s3-endpoint=${PGBACKREST_S3_ENDPOINT}
repo1-s3-region=${PGBACKREST_S3_REGION}
repo1-s3-key=${PGBACKREST_S3_KEY}
repo1-s3-key-secret=${PGBACKREST_S3_KEY_SECRET}
# OVH uses path-style addressing on most regions:
repo1-s3-uri-style=path
repo1-path=/pgbackrest/ytdb

# ---- Encryption at rest (PLACEHOLDER) ---------------------------------------
# Client-side AES-256-CBC. Generate a strong passphrase and supply via
# ${PGBACKREST_REPO_CIPHER_PASS}. Without this, backups are stored unencrypted.
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=${PGBACKREST_REPO_CIPHER_PASS}

# ---- Retention --------------------------------------------------------------
# Keep 4 weekly full backups; 7 daily backups via the differential/full mix.
# Operate: take a FULL weekly + DIFF daily (cron in README). pgBackRest expires
# WAL + diffs tied to full backups it removes.
repo1-retention-full=4
repo1-retention-full-type=count
repo1-retention-diff=7

# ---- WAL archiving + performance --------------------------------------------
archive-async=y
archive-get-queue-max=1GiB
compress-type=zst
compress-level=3
process-max=4
start-fast=y
# Verify backups can be read back (checksum) — cheap insurance.
repo1-retention-archive-type=diff

# Logging
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

[ytdb]
# ---- Stanza: the Patroni/Spilo cluster -------------------------------------
# pg1-path is the Spilo PGDATA. On Spilo 16 the data dir is under the mounted
# pgdata volume — confirm at deploy (typically /home/postgres/pgdata/pgroot/data).
pg1-path=/home/postgres/pgdata/pgroot/data
pg1-port=5432
# pg1-socket-path may be needed if the cluster only accepts local socket for the
# backup user; set if `pgbackrest ... check` complains about the connection.
