# nginx configuration for high availability load balancing
# Reverse proxy on port 4000 (public) -> app instances on ports 4001 and 4002

upstream app_backend {
  # Round-robin load balancing between two app instances
  server app-4001:3000 max_fails=3 fail_timeout=30s;
  server app-4002:3000 max_fails=3 fail_timeout=30s;

  # Keep-alive connections to backend
  keepalive 32;
}

server {
  listen 4000;
  server_name _;

  # Increase client max body size for video uploads
  client_max_body_size 500M;

  # Timeouts for long-running requests (video processing)
  proxy_connect_timeout 60s;
  proxy_send_timeout 600s;
  proxy_read_timeout 600s;

  location / {
    proxy_pass http://app_backend;

    # Pass full host including port so Clerk can build correct redirect URLs
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;

    # HTTP/1.1 + keep-alive to upstream
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_upgrade;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
  }

  # Health check endpoint (internal use only)
  location /api/health {
    access_log off;
    proxy_pass http://app_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Logging
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;
}
