# nginx configuration for high availability load balancing
# Reverse proxy on port 4000 (public) -> app instances on ports 4001 and 4002

upstream app_backend {
  # Round-robin load balancing between two app instances
  server app-ha-1:3000 max_fails=3 fail_timeout=30s;
  server app-ha-2:3000 max_fails=3 fail_timeout=30s;

  # Keep-alive connections to backend
  keepalive 32;
}

server {
  listen 4000;
  server_name _;

  # Increase client max body size for video uploads
  client_max_body_size 500M;

  # Timeouts for long-running requests (video processing)
  proxy_connect_timeout 60s;
  proxy_send_timeout 600s;
  proxy_read_timeout 600s;

  # Gzip compression for text-based assets
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml font/woff2;

  # Immutable caching for Next.js content-hashed static assets
  location /_next/static/ {
    proxy_pass http://app_backend;

    # Preserve original request information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    # Keep-alive to backend
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Content-hashed assets never change — cache forever
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Caching for other static file types (30 days)
  location ~* \.(?:js|css|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
    proxy_pass http://app_backend;

    # Preserve original request information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    # Keep-alive to backend
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    add_header Cache-Control "public, max-age=2592000";
  }

  location / {
    proxy_pass http://app_backend;

    # Preserve original request information
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Buffering for proxying
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # Keep-alive to backend
    proxy_set_header Connection "";
  }

  # Health check endpoint (internal use only)
  location /api/health {
    access_log off;
    proxy_pass http://app_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Logging
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;
}
