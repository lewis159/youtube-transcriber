global_defs {
  router_id nginx_master
  script_user root
  enable_script_security
}

vrrp_script check_nginx {
  script "/bin/sh -c 'curl -f http://localhost:4000/api/health > /dev/null 2>&1'"
  interval 2
  weight -20
  fall 3
  rise 2
}

vrrp_instance VI_1 {
  state MASTER
  interface eth0
  virtual_router_id 51
  priority 100
  advert_int 1

  authentication {
    auth_type PASS
    auth_pass ha_nginx_pass
  }

  virtual_ipaddress {
    172.20.0.10/24 dev eth0
  }

  track_script {
    check_nginx
  }

  notify_master "/bin/sh -c 'echo MASTER > /tmp/keepalived_state'"
  notify_backup "/bin/sh -c 'echo BACKUP > /tmp/keepalived_state'"
  notify_fault "/bin/sh -c 'echo FAULT > /tmp/keepalived_state'"
}
