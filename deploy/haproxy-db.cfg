# =============================================================================
# YT Transcriber — DB HAProxy config (reuses Sentinel's proven pattern).
# Writes -> the current Patroni LEADER (only the leader answers 200 on /primary
# via the Patroni REST API on :8008). Reads -> any replica (load-balanced).
# Failover routing is automatic and config-free: when the leader changes,
# Patroni's REST endpoints flip and HAProxy re-routes.
#
# Server names target the Swarm SERVICE names of the Patroni members
# (patroni-a / patroni-b) on the `ytdb` overlay. Postgres listens on 5432
# inside each Spilo container; the Patroni REST health API is on 8008.
#
# Ship as a Swarm config:
#   docker config create ytdb_haproxy_v1 deploy/haproxy-db.cfg
# =============================================================================

global
    maxconn 400

defaults
    mode tcp
    timeout connect 5s
    timeout client 30m
    timeout server 30m
    retries 2

# Writes -> the current Patroni leader (only the leader answers 200 on /primary)
listen primary
    bind *:5432
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server patroni-a patroni-a:5432 check port 8008
    server patroni-b patroni-b:5432 check port 8008

# Reads -> any replica (load-balanced). PgBouncer points at :5432 (writes); use
# :5433 only if/when you add a read-only pool for reporting.
listen replicas
    bind *:5433
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    server patroni-a patroni-a:5432 check port 8008
    server patroni-b patroni-b:5432 check port 8008

# HAProxy stats UI (optional; expose only on a trusted network).
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
