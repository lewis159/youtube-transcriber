# Alertmanager routing for the YT Transcriber estate.
# Mounted as /etc/alertmanager/alertmanager.yml.
#
# PLACEHOLDER receivers. Replace the webhook/SMTP placeholders with real values
# before relying on alerting. Alertmanager does NOT expand ${ENV} in this file
# at runtime, so edit values here directly (or template + redeploy the config).
#
#   Slack/generic webhook : set webhook_configs.url  (was ${ALERT_WEBHOOK_URL})
#   Email                 : set global.smtp_* + email_configs

global:
  resolve_timeout: 5m
  # ── SMTP placeholders (uncomment + fill to enable email) ──
  # smtp_smarthost: "smtp.example.com:587"   # was ${SMTP_SMARTHOST}
  # smtp_from: "alerts@bentech.dev"          # was ${SMTP_FROM}
  # smtp_auth_username: "alerts@bentech.dev"
  # smtp_auth_password: "CHANGE_ME"

route:
  receiver: default-receiver
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Page critical alerts immediately (still to the same receiver for now).
    - matchers:
        - severity = "critical"
      receiver: default-receiver
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: default-receiver
    # ── Webhook (Slack incoming webhook or generic) ──
    # Replace the URL below with ${ALERT_WEBHOOK_URL}'s value.
    webhook_configs:
      - url: "http://example-placeholder-webhook.invalid/alerts"
        send_resolved: true
    # ── Email (uncomment after filling global.smtp_* above) ──
    # email_configs:
    #   - to: "ops@bentech.dev"
    #     send_resolved: true

inhibit_rules:
  # A critical alert silences the matching warning for the same instance.
  - source_matchers: ["severity = critical"]
    target_matchers: ["severity = warning"]
    equal: ["alertname", "instance"]
