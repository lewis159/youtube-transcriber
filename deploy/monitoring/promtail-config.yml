# Promtail config — runs mode: global, ships every node's Docker container
# logs to Loki. Mounted as /etc/promtail/config.yml.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  # Loki on the monitoring overlay.
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discover containers via the Docker socket and tail their logs.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # container name -> label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/?(.*)"
        target_label: container
      # Swarm service / project labels -> Loki labels (mirrors the project
      # convention). These appear on containers run by the app/monitoring stacks.
      - source_labels: ["__meta_docker_container_label_com_docker_swarm_service_name"]
        target_label: swarm_service
      - source_labels: ["__meta_docker_container_label_project_component"]
        target_label: component
      - source_labels: ["__meta_docker_container_label_project_env"]
        target_label: env
      # host (node) name
      - source_labels: ["__meta_docker_container_label_com_docker_swarm_node_id"]
        target_label: node
